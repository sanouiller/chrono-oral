<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrono Oral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: rgba(255,255,255,0.1);
    --text: #f0ede6;
    --muted: rgba(240,237,230,0.38);
    --accent: #f0ede6;
    --warn: #e8b455;
    --danger: #e05c4b;
    --green: #6dbd8a;
    --sidebar-w: 320px;
    --sidebar-transition: 0.38s cubic-bezier(0.4,0,0.2,1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: padding-right var(--sidebar-transition);
  }
  #app.sidebar-open { padding-right: var(--sidebar-w); }

  /* ── SETTINGS TOGGLE ── */
  #toggle-btn {
    position: fixed;
    top: 1.4rem;
    right: 1.4rem;
    z-index: 200;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 42px;
    height: 42px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    font-size: 1rem;
  }
  #toggle-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed;
    top: 0; right: 0;
    width: var(--sidebar-w);
    height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 100;
    transform: translateX(100%);
    transition: transform var(--sidebar-transition);
    overflow-y: auto;
    padding: 2rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }
  #sidebar.open { transform: translateX(0); }

  #sidebar h2 {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }

  .phase-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: end;
  }
  .phase-row label {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 5px;
  }
  .phase-row input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .phase-row input[type="text"]:focus { border-color: rgba(255,255,255,0.35); }
  .phase-row .dur-wrap { display: flex; align-items: center; gap: 6px; }
  .phase-row input[type="number"] {
    width: 64px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    padding: 7px 8px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .phase-row input[type="number"]::-webkit-inner-spin-button,
  .phase-row input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .phase-row input[type="number"]:focus { border-color: rgba(255,255,255,0.35); }
  .phase-row .unit {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  #sidebar-apply {
    margin-top: auto;
    background: var(--text);
    color: #0e0e0e;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 11px 0;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.03em;
    transition: opacity 0.2s, transform 0.1s;
  }
  #sidebar-apply:hover { opacity: 0.85; }
  #sidebar-apply:active { transform: scale(0.98); }

  /* ── MAIN DISPLAY ── */
  #phase-name {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    min-height: 1.6rem;
    margin-bottom: 1.2rem;
    transition: color 0.4s;
  }

  #time-display {
    font-family: 'DM Mono', monospace;
    font-size: clamp(7rem, 22vw, 16rem);
    font-weight: 300;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.03em;
    transition: color 0.4s;
    user-select: none;
  }
  #time-display.warning { color: var(--warn); }
  #time-display.danger  { color: var(--danger); }
  #time-display.launch  { font-size: clamp(4rem, 12vw, 9rem); letter-spacing: -0.01em; }
  #time-display.done    { color: var(--green); }

  /* progress arc / bar */
  #progress-wrap {
    width: min(480px, 80vw);
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin: 2rem 0 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #progress-wrap.visible { opacity: 1; }
  #progress-bar {
    height: 100%;
    border-radius: 2px;
    background: var(--text);
    transition: width 0.9s linear, background 0.4s;
    width: 100%;
  }
  #progress-bar.warning { background: var(--warn); }
  #progress-bar.danger  { background: var(--danger); }

  /* start button */
  #btn-start {
    margin-top: 3rem;
    background: none;
    border: 1px solid rgba(240,237,230,0.3);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 1rem 3rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  #btn-start:hover { background: rgba(255,255,255,0.07); border-color: rgba(240,237,230,0.6); }
  #btn-start:active { transform: scale(0.97); }

  #btn-reset {
    margin-top: 2.4rem;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    display: none;
  }
  #btn-reset:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  /* subtle scanline texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 300;
  }
</style>
</head>
<body>

<div id="app">
  <div id="phase-name"></div>
  <div id="time-display">—</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <button id="btn-start" onclick="startSession()">Démarrer</button>
  <button id="btn-reset" onclick="resetSession()">↺ Recommencer</button>
</div>

<!-- Settings toggle -->
<button id="toggle-btn" onclick="toggleSidebar()" title="Paramètres">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.3"/>
    <path d="M9 1.5V3M9 15v1.5M1.5 9H3M15 9h1.5M3.697 3.697l1.06 1.06M13.243 13.243l1.06 1.06M3.697 14.303l1.06-1.06M13.243 4.757l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  </svg>
</button>

<!-- Sidebar -->
<div id="sidebar">
  <h2>Paramètres</h2>
  <div id="phases-config"></div>
  <button id="sidebar-apply" onclick="applySettings()">Appliquer</button>
</div>

<script>
let phases = [
  { name: "Introduction", duration: 30 },
  { name: "Partie 1",     duration: 45 },
  { name: "Partie 2",     duration: 45 },
  { name: "Partie 3",     duration: 45 },
  { name: "Conclusion",   duration: 30 },
];

let timerInterval = null;
let remaining = 0;
let phaseTotal = 0;
let phaseIndex = 0;
let running = false;

const display    = document.getElementById('time-display');
const phaseName  = document.getElementById('phase-name');
const progWrap   = document.getElementById('progress-wrap');
const progBar    = document.getElementById('progress-bar');
const btnStart   = document.getElementById('btn-start');
const btnReset   = document.getElementById('btn-reset');
const sidebar    = document.getElementById('sidebar');
const app        = document.getElementById('app');

// Build sidebar form
function buildSidebarForm() {
  const container = document.getElementById('phases-config');
  container.innerHTML = '';
  phases.forEach((p, i) => {
    const row = document.createElement('div');
    row.innerHTML = `
      <div class="phase-row">
        <div>
          <label>Phase ${i+1} — nom</label>
          <input type="text" id="cfg-name-${i}" value="${p.name}">
        </div>
        <div>
          <label>Durée</label>
          <div class="dur-wrap">
            <input type="number" id="cfg-dur-${i}" value="${p.duration}" min="5" max="300">
            <span class="unit">sec</span>
          </div>
        </div>
      </div>
    `;
    container.appendChild(row);
  });
}

function applySettings() {
  phases = phases.map((p, i) => ({
    name: document.getElementById(`cfg-name-${i}`).value.trim() || p.name,
    duration: Math.max(5, parseInt(document.getElementById(`cfg-dur-${i}`).value) || p.duration),
  }));
  toggleSidebar();
  if (!running) resetSession();
}

function toggleSidebar() {
  const open = sidebar.classList.toggle('open');
  app.classList.toggle('sidebar-open', open);
  if (open) buildSidebarForm();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? m + ':' + String(sec).padStart(2,'0') : String(sec);
}

function setDisplayState(rem, total) {
  const pct = Math.max(0, (rem / total) * 100);
  progBar.style.width = pct + '%';
  const isWarning = rem <= 15 && rem > 10;
  const isDanger  = rem <= 10;
  display.classList.toggle('warning', isWarning);
  display.classList.toggle('danger', isDanger);
  progBar.classList.toggle('warning', isWarning);
  progBar.classList.toggle('danger', isDanger);
}

function startPhase(idx) {
  phaseIndex = idx;
  const p = phases[idx];
  remaining = p.duration;
  phaseTotal = p.duration;
  phaseName.textContent = p.name;
  display.className = '';
  display.textContent = formatTime(remaining);
  progWrap.classList.add('visible');
  progBar.style.width = '100%';
  progBar.className = '';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    remaining--;
    if (remaining < 0) {
      clearInterval(timerInterval);
      if (phaseIndex < phases.length - 1) {
        flashTransition(() => startPhase(phaseIndex + 1));
      } else {
        endSession();
      }
      return;
    }
    display.textContent = formatTime(remaining);
    setDisplayState(remaining, phaseTotal);
  }, 1000);
}

function flashTransition(cb) {
  display.style.opacity = '0';
  phaseName.style.opacity = '0';
  setTimeout(() => {
    cb();
    display.style.transition = 'opacity 0.35s, color 0.4s';
    phaseName.style.transition = 'opacity 0.35s, color 0.4s';
    display.style.opacity = '1';
    phaseName.style.opacity = '1';
    setTimeout(() => {
      display.style.transition = 'color 0.4s';
      phaseName.style.transition = 'color 0.4s';
    }, 400);
  }, 200);
}

function doCountdown() {
  running = true;
  btnStart.style.display = 'none';
  progWrap.classList.remove('visible');
  phaseName.textContent = '';
  display.className = '';
  let count = 3;
  display.textContent = String(count);

  timerInterval = setInterval(() => {
    count--;
    if (count === 0) {
      display.className = 'launch';
      display.textContent = 'Partez !';
    } else if (count < 0) {
      clearInterval(timerInterval);
      flashTransition(() => startPhase(0));
    } else {
      display.textContent = String(count);
    }
  }, 850);
}

function startSession() {
  btnReset.style.display = 'inline-block';
  doCountdown();
}

function endSession() {
  running = false;
  display.className = 'done';
  display.textContent = '✓';
  phaseName.textContent = 'Terminé';
  progWrap.classList.remove('visible');
}

function resetSession() {
  clearInterval(timerInterval);
  running = false;
  display.className = '';
  display.textContent = '—';
  phaseName.textContent = '';
  progWrap.classList.remove('visible');
  progBar.style.width = '100%';
  progBar.className = '';
  btnStart.style.display = 'inline-block';
  btnReset.style.display = 'none';
}

// Keyboard shortcut: Space to start/reset
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('input')) {
    e.preventDefault();
    if (!running) startSession();
  }
  if (e.code === 'Escape') {
    if (sidebar.classList.contains('open')) toggleSidebar();
  }
});
</script>
</body>
</html>
