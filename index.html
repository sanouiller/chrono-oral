<!DOCTYPE html>
<html lang="fr" data-theme="neon">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chrono Oral</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Fredoka+One&family=Quicksand:wght@300;400;500;600&family=Bebas+Neue&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════════════════
   THEME VARIABLES
══════════════════════════════════════════ */

[data-theme="neon"] {
  --bg: #050505;
  --surface: #0d0d0d;
  --surface2: #141414;
  --border: rgba(57,255,20,0.18);
  --border2: rgba(57,255,20,0.45);
  --text: #39ff14;
  --muted: rgba(57,255,20,0.38);
  --muted2: rgba(57,255,20,0.14);
  --warn: #ffe600;
  --danger: #ff3131;
  --done: #39ff14;
  --btn-bg: transparent;
  --btn-color: #39ff14;
  --btn-border: rgba(57,255,20,0.4);
  --font-display: 'Share Tech Mono', monospace;
  --font-ui: 'Share Tech Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  --radius-btn: 4px;
  --radius-phase: 8px;
  --sidebar-blend: #0d0d0d;
}
[data-theme="gothic"] {
  --bg: #100808;
  --surface: #1a0e0e;
  --surface2: #221414;
  --border: rgba(160,30,30,0.28);
  --border2: rgba(160,30,30,0.55);
  --text: #e8d5b0;
  --muted: rgba(232,213,176,0.4);
  --muted2: rgba(232,213,176,0.14);
  --warn: #c8960a;
  --danger: #cc2200;
  --done: #6a9a6a;
  --btn-bg: transparent;
  --btn-color: #e8d5b0;
  --btn-border: rgba(232,213,176,0.3);
  --font-display: 'Cinzel Decorative', serif;
  --font-ui: 'Cinzel', serif;
  --font-body: 'Cinzel', serif;
  --radius-btn: 2px;
  --radius-phase: 4px;
  --sidebar-blend: #1a0e0e;
}
[data-theme="colore"] {
  --bg: #fff8f0;
  --surface: #fff0e0;
  --surface2: #ffe8d0;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.22);
  --text: #1a1040;
  --muted: rgba(26,16,64,0.42);
  --muted2: rgba(26,16,64,0.15);
  --warn: #ff9900;
  --danger: #ff3055;
  --done: #22bb55;
  --btn-bg: transparent;
  --btn-color: #1a1040;
  --btn-border: rgba(26,16,64,0.28);
  --font-display: 'Fredoka One', cursive;
  --font-ui: 'Fredoka One', cursive;
  --font-body: 'DM Sans', sans-serif;
  --radius-btn: 50px;
  --radius-phase: 12px;
  --sidebar-blend: #fff0e0;
}
[data-theme="pastel"] {
  --bg: #fdf0f8;
  --surface: #f7e4f3;
  --surface2: #f0d4ec;
  --border: rgba(180,80,160,0.18);
  --border2: rgba(180,80,160,0.38);
  --text: #6a2d80;
  --muted: rgba(106,45,128,0.42);
  --muted2: rgba(106,45,128,0.15);
  --warn: #e09040;
  --danger: #e05575;
  --done: #60b080;
  --btn-bg: transparent;
  --btn-color: #6a2d80;
  --btn-border: rgba(106,45,128,0.3);
  --font-display: 'Quicksand', sans-serif;
  --font-ui: 'Quicksand', sans-serif;
  --font-body: 'Quicksand', sans-serif;
  --radius-btn: 999px;
  --radius-phase: 16px;
  --sidebar-blend: #f7e4f3;
}
[data-theme="street"] {
  --bg: #191919;
  --surface: #212121;
  --surface2: #2a2a2a;
  --border: rgba(255,200,0,0.22);
  --border2: rgba(255,200,0,0.5);
  --text: #ffd700;
  --muted: rgba(255,215,0,0.42);
  --muted2: rgba(255,215,0,0.15);
  --warn: #ff6600;
  --danger: #ff1744;
  --done: #76ff03;
  --btn-bg: transparent;
  --btn-color: #ffd700;
  --btn-border: rgba(255,215,0,0.38);
  --font-display: 'Bebas Neue', sans-serif;
  --font-ui: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius-btn: 0px;
  --radius-phase: 0px;
  --sidebar-blend: #212121;
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
  transition: background 0.5s, color 0.5s;
}

/* ── Gothic vignette ── */
[data-theme="gothic"] body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(0,0,0,0.55) 100%);
  pointer-events: none; z-index: 0;
}
[data-theme="gothic"] #app, [data-theme="gothic"] #toggle-btn, [data-theme="gothic"] #sidebar {
  position: relative; z-index: 1;
}

/* ── Coloré background pattern ── */
[data-theme="colore"] body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,100,150,0.1) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(100,150,255,0.1) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,200,50,0.06) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
[data-theme="colore"] #app, [data-theme="colore"] #toggle-btn, [data-theme="colore"] #sidebar { position: relative; z-index: 1; }

/* ── Street art concrete texture ── */
[data-theme="street"] body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 7px, rgba(0,0,0,0.04) 7px, rgba(0,0,0,0.04) 8px);
  pointer-events: none; z-index: 0;
}
[data-theme="street"] #app, [data-theme="street"] #toggle-btn, [data-theme="street"] #sidebar { position: relative; z-index: 1; }

/* ── Pastel soft bg ── */
[data-theme="pastel"] body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 10% 90%, rgba(255,180,220,0.25) 0%, transparent 40%),
    radial-gradient(circle at 90% 10%, rgba(180,200,255,0.2) 0%, transparent 40%);
  pointer-events: none; z-index: 0;
}
[data-theme="pastel"] #app, [data-theme="pastel"] #toggle-btn, [data-theme="pastel"] #sidebar { position: relative; z-index: 1; }

/* Scanline for dark themes */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 300;
}
[data-theme="colore"] body::after, [data-theme="pastel"] body::after { opacity: 0.2; }

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
#app {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: padding-right 0.38s cubic-bezier(0.4,0,0.2,1);
}
#app.sidebar-open { padding-right: 340px; }

/* ══════════════════════════════════════════
   TOGGLE BTN
══════════════════════════════════════════ */
#toggle-btn {
  position: fixed; top: 1.4rem; right: 1.4rem; z-index: 200;
  background: none; border: 1px solid var(--border); color: var(--muted);
  width: 42px; height: 42px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
#toggle-btn:hover, #toggle-btn.active {
  color: var(--text); border-color: var(--border2); background: rgba(128,128,128,0.08);
}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
#sidebar {
  position: fixed; top: 0; right: 0; width: 340px; height: 100%;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 100; transform: translateX(100%);
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar.open { transform: translateX(0); }

#sidebar-header { padding: 1.3rem 1.3rem 1rem; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 1rem; }

.sidebar-section-label {
  font-family: var(--font-ui);
  font-size: 0.62rem; font-weight: 400;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
}

/* ── Theme chips ── */
#themes-row { display: flex; gap: 7px; flex-wrap: wrap; }
.theme-chip {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; background: none; border: none; padding: 2px;
}
.theme-preview {
  width: 50px; height: 34px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  border: 2.5px solid transparent;
  transition: border-color 0.18s, transform 0.18s;
  outline: none;
}
.theme-chip:hover .theme-preview { transform: scale(1.06); }
.theme-chip.active .theme-preview { border-color: white; box-shadow: 0 0 0 1px rgba(255,255,255,0.3); }
.theme-chip-label {
  font-family: var(--font-body);
  font-size: 0.6rem; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* ── Presets ── */
#presets-row { display: flex; gap: 5px; flex-wrap: wrap; }
.preset-btn {
  font-family: var(--font-ui);
  font-size: 0.68rem; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: none; color: var(--muted);
  cursor: pointer; transition: all 0.16s; white-space: nowrap;
}
.preset-btn:hover { color: var(--text); border-color: var(--border2); }
.preset-btn.active { color: var(--bg); background: var(--text); border-color: var(--text); }
.preset-btn.del { color: rgba(200,50,50,0.55); border-color: rgba(200,50,50,0.2); padding: 5px 8px; }
.preset-btn.del:hover { color: var(--danger); border-color: var(--danger); }

#save-row { display: none; gap: 6px; align-items: center; }
#save-row.on { display: flex; }
#preset-name-input {
  flex: 1; background: rgba(128,128,128,0.08); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: var(--font-body);
  font-size: 0.85rem; padding: 6px 9px; outline: none; transition: border-color 0.2s;
}
#preset-name-input:focus { border-color: var(--border2); }
#preset-name-input::placeholder { color: var(--muted); }
#save-ok {
  background: var(--text); color: var(--bg); border: none; border-radius: 6px;
  font-family: var(--font-body); font-size: 0.82rem; font-weight: 500;
  padding: 6px 12px; cursor: pointer; transition: opacity 0.18s; white-space: nowrap;
}
#save-ok:hover { opacity: 0.82; }

/* ── Phase list ── */
#sidebar-body { flex: 1; overflow-y: auto; padding: 1rem 1.3rem; display: flex; flex-direction: column; gap: 8px; }
#sidebar-body::-webkit-scrollbar { width: 4px; }
#sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.phase-row {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-phase);
  padding: 10px 12px; display: grid;
  grid-template-columns: 1fr 76px 30px; gap: 8px; align-items: center;
}
.phase-row input[type="text"] {
  background: none; border: none; color: var(--text);
  font-family: var(--font-body); font-size: 0.9rem; outline: none; width: 100%;
}
.phase-row input[type="text"]::placeholder { color: var(--muted); }
.dur-cell { display: flex; align-items: center; gap: 4px; border-left: 1px solid var(--border); padding-left: 8px; }
.phase-row input[type="number"] {
  width: 42px; background: none; border: none; color: var(--text);
  font-family: var(--font-ui); font-size: 0.9rem; outline: none;
  text-align: right; -moz-appearance: textfield;
}
.phase-row input[type="number"]::-webkit-inner-spin-button,
.phase-row input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
.dur-unit { font-size: 0.65rem; color: var(--muted); }
.del-btn {
  background: none; border: none; color: var(--muted2); cursor: pointer;
  width: 26px; height: 26px; border-radius: 4px; font-size: 0.88rem;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.16s, background 0.16s;
}
.del-btn:hover { color: var(--danger); background: rgba(200,50,50,0.1); }

#add-btn {
  background: none; border: 1px dashed var(--border); color: var(--muted);
  font-family: var(--font-ui); font-size: 0.68rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 9px; border-radius: var(--radius-phase);
  cursor: pointer; transition: all 0.18s; width: 100%;
}
#add-btn:hover { color: var(--text); border-color: var(--border2); }

#sidebar-footer { padding: 1rem 1.3rem; border-top: 1px solid var(--border); }
#apply-btn {
  background: var(--text); color: var(--bg); border: none;
  border-radius: var(--radius-btn);
  font-family: var(--font-ui); font-size: 0.95rem; font-weight: 500;
  padding: 11px 0; cursor: pointer; width: 100%; letter-spacing: 0.05em;
  transition: opacity 0.2s, transform 0.1s; text-transform: uppercase;
}
#apply-btn:hover { opacity: 0.84; }
#apply-btn:active { transform: scale(0.98); }

/* ══════════════════════════════════════════
   MAIN DISPLAY
══════════════════════════════════════════ */
#phase-name {
  font-family: var(--font-ui);
  font-size: 1rem; font-weight: 400;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
  min-height: 1.5rem; margin-bottom: 1rem;
  transition: color 0.4s;
}
#time-display {
  font-family: var(--font-display);
  font-size: clamp(7rem, 22vw, 16rem);
  font-weight: 400; line-height: 1; color: var(--text);
  letter-spacing: -0.02em;
  transition: color 0.4s;
  user-select: none;
}
#time-display.warning { color: var(--warn); }
#time-display.danger  { color: var(--danger); }
#time-display.launch  { font-size: clamp(3.5rem, 10vw, 8rem); letter-spacing: 0; }
#time-display.done    { color: var(--done); }
#time-display.overtime {
  color: var(--danger);
  font-size: clamp(5rem, 16vw, 11rem);
  animation: overtime-pulse 1.2s ease-in-out infinite;
}
@keyframes overtime-pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.72; }
}

/* ── Next phase label ── */
#next-phase {
  font-family: var(--font-ui);
  font-size: 0.68rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted2);
  margin-top: 0.9rem; min-height: 1.1rem;
}

/* ── Progress bar ── */
#prog-wrap {
  width: min(480px, 80vw); height: 4px;
  background: rgba(128,128,128,0.1);
  border-radius: 2px; margin: 1.5rem 0 0;
  overflow: hidden; opacity: 0; transition: opacity 0.4s;
}
#prog-wrap.on { opacity: 1; }
#prog-bar {
  height: 100%; border-radius: 2px; background: var(--text);
  transition: width 0.9s linear, background 0.4s; width: 100%;
}
#prog-bar.warning { background: var(--warn); }
#prog-bar.danger  { background: var(--danger); }

/* ── Coloré rainbow bar ── */
[data-theme="colore"] #prog-bar {
  background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
  background-size: 300% 100%;
  animation: rainbow-slide 3s linear infinite;
}
@keyframes rainbow-slide {
  0% { background-position: 0% 0; }
  100% { background-position: 300% 0; }
}
[data-theme="colore"] #prog-bar.danger { background: var(--danger); animation: none; }

/* ── Start button ── */
#btn-start {
  margin-top: 2.8rem;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  color: var(--btn-color);
  font-family: var(--font-ui);
  font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
  padding: 1rem 3rem; border-radius: var(--radius-btn); cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.1s, box-shadow 0.2s;
}
#btn-start:hover { border-color: var(--text); background: rgba(128,128,128,0.07); }
#btn-start:active { transform: scale(0.97); }

#btn-reset {
  margin-top: 2rem; background: none; border: none; color: var(--muted);
  font-family: var(--font-ui); font-size: 0.72rem;
  letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
  padding: 6px 14px; border-radius: var(--radius-btn); display: none;
  transition: color 0.2s, background 0.2s;
}
#btn-reset:hover { color: var(--text); background: rgba(128,128,128,0.07); }

/* ══════════════════════════════════════════
   THEME-SPECIFIC EFFECTS
══════════════════════════════════════════ */

/* NÉON – glow + flicker */
[data-theme="neon"] #time-display {
  text-shadow: 0 0 20px rgba(57,255,20,0.8), 0 0 60px rgba(57,255,20,0.4), 0 0 120px rgba(57,255,20,0.15);
  animation: neon-flicker 6s infinite;
}
[data-theme="neon"] #time-display.warning {
  text-shadow: 0 0 20px rgba(255,230,0,0.8), 0 0 60px rgba(255,230,0,0.4);
}
[data-theme="neon"] #time-display.danger {
  text-shadow: 0 0 20px rgba(255,49,49,0.8), 0 0 60px rgba(255,49,49,0.4);
}
[data-theme="neon"] #time-display.overtime {
  text-shadow: 0 0 24px rgba(255,49,49,1), 0 0 70px rgba(255,49,49,0.5);
  animation: overtime-pulse 1.2s ease-in-out infinite;
}
[data-theme="neon"] #btn-start {
  box-shadow: 0 0 14px rgba(57,255,20,0.15);
}
[data-theme="neon"] #btn-start:hover {
  box-shadow: 0 0 24px rgba(57,255,20,0.3);
}
@keyframes neon-flicker {
  0%,18%,20%,28%,100% { opacity:1; }
  19%,29% { opacity:0.88; }
}

/* GOTHIQUE – ornamental details */
[data-theme="gothic"] #time-display {
  text-shadow: 0 2px 20px rgba(180,30,30,0.3);
  letter-spacing: 0.04em;
}
[data-theme="gothic"] #phase-name::before,
[data-theme="gothic"] #phase-name::after {
  content: ' ✦ ';
  opacity: 0.4;
  font-size: 0.7em;
}
[data-theme="gothic"] #btn-start {
  border-color: rgba(232,213,176,0.4);
  box-shadow: inset 0 0 30px rgba(100,0,0,0.15);
}

/* COLORÉ – bouncy & vivid */
[data-theme="colore"] #time-display {
  letter-spacing: 0.01em;
}
[data-theme="colore"] #btn-start {
  border-width: 2px;
  background: linear-gradient(135deg, rgba(255,107,107,0.08), rgba(77,150,255,0.08));
}
[data-theme="colore"] #btn-start:hover {
  background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(77,150,255,0.15));
}

/* PASTEL – soft & rounded */
[data-theme="pastel"] #time-display {
  font-weight: 600;
  letter-spacing: 0.01em;
}
[data-theme="pastel"] #prog-wrap { border-radius: 999px; height: 6px; }
[data-theme="pastel"] #prog-bar { border-radius: 999px; }
[data-theme="pastel"] #btn-start {
  background: linear-gradient(135deg, rgba(255,150,200,0.12), rgba(180,150,255,0.12));
  box-shadow: 0 4px 20px rgba(180,80,160,0.1);
}
[data-theme="pastel"] #btn-start:hover {
  background: linear-gradient(135deg, rgba(255,150,200,0.2), rgba(180,150,255,0.2));
  box-shadow: 0 6px 28px rgba(180,80,160,0.18);
}

/* STREET ART – bold & raw */
[data-theme="street"] #time-display {
  font-size: clamp(8rem, 26vw, 20rem);
  letter-spacing: 0.04em;
  -webkit-text-stroke: 2px rgba(255,100,0,0.5);
  text-shadow: 4px 4px 0 rgba(255,100,0,0.25), -2px -2px 0 rgba(255,50,0,0.15);
}
[data-theme="street"] #time-display.warning {
  -webkit-text-stroke: 2px rgba(255,80,0,0.7);
  text-shadow: 4px 4px 0 rgba(255,80,0,0.3);
}
[data-theme="street"] #time-display.danger {
  -webkit-text-stroke: 2px rgba(255,23,68,0.8);
  text-shadow: 4px 4px 0 rgba(255,23,68,0.35);
}
[data-theme="street"] #time-display.overtime {
  -webkit-text-stroke: 3px rgba(255,23,68,1);
  text-shadow: 5px 5px 0 rgba(255,0,50,0.4);
}
[data-theme="street"] #btn-start {
  border-width: 3px;
  font-size: clamp(1rem, 3vw, 1.6rem);
  letter-spacing: 0.24em;
}
[data-theme="street"] #phase-name {
  font-size: 1.2rem; letter-spacing: 0.28em;
}
</style>
</head>
<body>

<div id="app">
  <div id="phase-name"></div>
  <div id="time-display">—</div>
  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div id="next-phase"></div>
  <button id="btn-start" onclick="startSession()">Démarrer</button>
  <button id="btn-reset" onclick="resetSession()">↺ Recommencer</button>
</div>

<button id="toggle-btn" onclick="toggleSidebar()" title="Paramètres">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.3"/>
    <path d="M9 1.5V3M9 15v1.5M1.5 9H3M15 9h1.5M3.697 3.697l1.06 1.06M13.243 13.243l1.06 1.06M3.697 14.303l1.06-1.06M13.243 4.757l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  </svg>
</button>

<div id="sidebar">
  <div id="sidebar-header">

    <!-- THEMES -->
    <div class="sidebar-section-label">Thème</div>
    <div id="themes-row">
      <button class="theme-chip active" data-theme-target="neon" onclick="setTheme('neon',this)">
        <div class="theme-preview" style="background:#050505; color:#39ff14; text-shadow:0 0 8px #39ff14;">NÉO</div>
        <span class="theme-chip-label">Néon</span>
      </button>
      <button class="theme-chip" data-theme-target="gothic" onclick="setTheme('gothic',this)">
        <div class="theme-preview" style="background:#100808; color:#e8d5b0; font-family:'Cinzel Decorative',serif; font-size:9px;">GOT</div>
        <span class="theme-chip-label">Gothique</span>
      </button>
      <button class="theme-chip" data-theme-target="colore" onclick="setTheme('colore',this)">
        <div class="theme-preview" style="background:linear-gradient(135deg,#fff8f0,#fff0e0); color:#1a1040; font-family:'Fredoka One',cursive; font-size:11px; border-radius:8px;">COL</div>
        <span class="theme-chip-label">Coloré</span>
      </button>
      <button class="theme-chip" data-theme-target="pastel" onclick="setTheme('pastel',this)">
        <div class="theme-preview" style="background:linear-gradient(135deg,#fdf0f8,#f0d4ec); color:#6a2d80; font-family:'Quicksand',sans-serif; font-size:10px; font-weight:600; border-radius:10px;">PAS</div>
        <span class="theme-chip-label">Pastel</span>
      </button>
      <button class="theme-chip" data-theme-target="street" onclick="setTheme('street',this)">
        <div class="theme-preview" style="background:#191919; color:#ffd700; font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:0.08em; -webkit-text-stroke:1px rgba(255,100,0,0.6);">STR</div>
        <span class="theme-chip-label">Street</span>
      </button>
    </div>

    <!-- PRESETS -->
    <div class="sidebar-section-label">Présélections</div>
    <div id="presets-row"></div>
    <div id="save-row">
      <input type="text" id="preset-name-input" placeholder="Nom de la présélection…" maxlength="24">
      <button id="save-ok" onclick="confirmSave()">OK</button>
    </div>

  </div>

  <!-- PHASES -->
  <div id="sidebar-body">
    <div class="sidebar-section-label" style="padding-bottom:6px;">Phases</div>
    <div id="phases-config"></div>
    <button id="add-btn" onclick="addPhaseRow()">+ Ajouter une phase</button>
  </div>

  <div id="sidebar-footer">
    <button id="apply-btn" onclick="applySettings()">Appliquer</button>
  </div>
</div>

<script>
// ── DATA ──
const BUILTIN = {
  "3 min": [
    { name: "Introduction", duration: 30 },
    { name: "Partie 1",     duration: 45 },
    { name: "Partie 2",     duration: 45 },
    { name: "Partie 3",     duration: 45 },
    { name: "Conclusion",   duration: 30 },
  ],
  "5 min": [
    { name: "Introduction", duration: 45 },
    { name: "Partie 1",     duration: 75 },
    { name: "Partie 2",     duration: 75 },
    { name: "Partie 3",     duration: 75 },
    { name: "Conclusion",   duration: 45 },
  ],
  "2 min": [
    { name: "Introduction", duration: 20 },
    { name: "Développement", duration: 60 },
    { name: "Conclusion",   duration: 20 },
  ],
};

let phases = JSON.parse(JSON.stringify(BUILTIN["3 min"]));
let activePreset = "3 min";
let timerInterval = null;
let remaining = 0, phaseTotal = 0, phaseIndex = 0, running = false;
let currentTheme = localStorage.getItem('chrono_theme') || 'neon';

const display  = document.getElementById('time-display');
const nameEl   = document.getElementById('phase-name');
const nextEl   = document.getElementById('next-phase');
const progWrap = document.getElementById('prog-wrap');
const progBar  = document.getElementById('prog-bar');
const btnStart = document.getElementById('btn-start');
const btnReset = document.getElementById('btn-reset');
const sidebar  = document.getElementById('sidebar');
const app      = document.getElementById('app');

// ── THEME ──
function setTheme(name, chipEl) {
  document.documentElement.setAttribute('data-theme', name);
  currentTheme = name;
  localStorage.setItem('chrono_theme', name);
  document.querySelectorAll('.theme-chip').forEach(c => c.classList.remove('active'));
  if (chipEl) chipEl.classList.add('active');
  else {
    const target = document.querySelector(`[data-theme-target="${name}"]`);
    if (target) target.classList.add('active');
  }
}
// Apply saved theme on load
setTheme(currentTheme, null);

// ── AUDIO ──
let actx = null;
function ac() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function beep(type) {
  try {
    const c = ac();
    if (type === 'tick') {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.frequency.value = 660;
      g.gain.setValueAtTime(0.12, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.18);
      o.start(); o.stop(c.currentTime + 0.18);
    } else if (type === 'phase') {
      [880, 1100].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        const t = c.currentTime + i * 0.13;
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.16, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        o.start(t); o.stop(t + 0.28);
      });
    } else if (type === 'end') {
      [880, 1100, 1320].forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        const t = c.currentTime + i * 0.17;
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.18, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
        o.start(t); o.stop(t + 0.32);
      });
    }
  } catch(e) {}
}

// ── PRESETS ──
function getCustom() {
  try { return JSON.parse(localStorage.getItem('chrono_presets') || '{}'); } catch(e) { return {}; }
}
function setCustom(obj) {
  try { localStorage.setItem('chrono_presets', JSON.stringify(obj)); } catch(e) {}
}

function renderPresets() {
  const row = document.getElementById('presets-row');
  const custom = getCustom();
  const all = { ...BUILTIN, ...custom };
  row.innerHTML = '';
  Object.entries(all).forEach(([name, cfg]) => {
    const b = document.createElement('button');
    b.className = 'preset-btn' + (name === activePreset ? ' active' : '');
    b.textContent = name;
    b.onclick = () => { activePreset = name; phases = JSON.parse(JSON.stringify(cfg)); buildForm(); renderPresets(); };
    row.appendChild(b);
    if (custom[name]) {
      const d = document.createElement('button');
      d.className = 'preset-btn del'; d.textContent = '✕'; d.title = 'Supprimer';
      d.onclick = e => { e.stopPropagation(); const c2 = getCustom(); delete c2[name]; setCustom(c2); if (activePreset === name) activePreset = '3 min'; renderPresets(); };
      row.appendChild(d);
    }
  });
  const sv = document.createElement('button');
  sv.className = 'preset-btn'; sv.textContent = '+ Sauvegarder';
  sv.onclick = () => document.getElementById('save-row').classList.toggle('on');
  row.appendChild(sv);
}

function confirmSave() {
  const inp = document.getElementById('preset-name-input');
  const name = inp.value.trim(); if (!name) return;
  const c = getCustom(); c[name] = readForm(); setCustom(c);
  activePreset = name; inp.value = '';
  document.getElementById('save-row').classList.remove('on');
  renderPresets();
}

// ── SIDEBAR FORM ──
function buildForm() {
  const cfg = document.getElementById('phases-config');
  cfg.innerHTML = '';
  phases.forEach(p => addRowWith(p.name, p.duration));
}

function addPhaseRow() { addRowWith('', 45); }

function addRowWith(name, dur) {
  const cfg = document.getElementById('phases-config');
  const row = document.createElement('div');
  row.className = 'phase-row';
  row.innerHTML = `
    <input type="text" placeholder="Nom…" value="${name}">
    <div class="dur-cell">
      <input type="number" value="${dur}" min="5" max="600">
      <span class="dur-unit">sec</span>
    </div>
    <button class="del-btn" onclick="this.closest('.phase-row').remove()" title="Supprimer">✕</button>
  `;
  cfg.appendChild(row);
}

function readForm() {
  return Array.from(document.querySelectorAll('#phases-config .phase-row')).map(r => ({
    name: r.querySelector('input[type=text]').value.trim() || 'Phase',
    duration: Math.max(5, parseInt(r.querySelector('input[type=number]').value) || 30),
  }));
}

function applySettings() {
  phases = readForm();
  if (!phases.length) phases = JSON.parse(JSON.stringify(BUILTIN["3 min"]));
  toggleSidebar();
  if (!running) resetSession();
}

function toggleSidebar() {
  const open = sidebar.classList.toggle('open');
  app.classList.toggle('sidebar-open', open);
  document.getElementById('toggle-btn').classList.toggle('active', open);
  if (open) { buildForm(); renderPresets(); }
}

// ── TIMER ──
function fmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return m > 0 ? m + ':' + String(sec).padStart(2,'0') : String(sec);
}

function setColors(rem, total) {
  progBar.style.width = Math.max(0, rem / total * 100) + '%';
  const w = rem <= 15 && rem > 10, d = rem <= 10;
  display.classList.toggle('warning', w); display.classList.toggle('danger', d);
  progBar.classList.toggle('warning', w); progBar.classList.toggle('danger', d);
}

function startPhase(idx) {
  phaseIndex = idx;
  const p = phases[idx];
  remaining = phaseTotal = p.duration;
  nameEl.textContent = p.name;
  display.className = ''; display.textContent = fmt(remaining);
  progWrap.classList.add('on');
  progBar.style.width = '100%'; progBar.className = '';
  nextEl.textContent = phases[idx+1] ? '→ ' + phases[idx+1].name : '';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    remaining--;
    if (remaining < 0) {
      clearInterval(timerInterval);
      if (phaseIndex < phases.length - 1) { beep('phase'); fade(() => startPhase(phaseIndex + 1)); }
      else { beep('end'); endSession(); }
      return;
    }
    display.textContent = fmt(remaining);
    setColors(remaining, phaseTotal);
  }, 1000);
}

function fade(cb) {
  [display, nameEl, nextEl].forEach(el => el.style.opacity = '0');
  setTimeout(() => {
    cb();
    [display, nameEl, nextEl].forEach(el => { el.style.transition = 'opacity 0.3s, color 0.4s'; el.style.opacity = '1'; });
    setTimeout(() => [display, nameEl, nextEl].forEach(el => el.style.transition = 'color 0.4s'), 350);
  }, 200);
}

function doCountdown() {
  running = true; btnStart.style.display = 'none';
  progWrap.classList.remove('on'); nameEl.textContent = ''; nextEl.textContent = '';
  display.className = '';
  let n = 3; display.textContent = String(n); beep('tick');
  timerInterval = setInterval(() => {
    n--;
    if (n === 0) { display.className = 'launch'; display.textContent = 'Partez !'; }
    else if (n < 0) { clearInterval(timerInterval); fade(() => startPhase(0)); }
    else { beep('tick'); display.textContent = String(n); }
  }, 850);
}

function startSession() {
  if (!phases.length) return;
  btnReset.style.display = 'inline-block';
  doCountdown();
}

function endSession() {
  beep('end');
  fade(() => startOvertime());
}

let overtimeElapsed = 0;
function startOvertime() {
  overtimeElapsed = 0;
  display.className = 'overtime';
  display.textContent = '+0';
  nameEl.textContent = 'Temps dépassé';
  nextEl.textContent = '';
  progWrap.classList.remove('on');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    overtimeElapsed++;
    display.textContent = '+' + fmt(overtimeElapsed);
  }, 1000);
}

function resetSession() {
  clearInterval(timerInterval); running = false;
  overtimeElapsed = 0;
  display.className = ''; display.textContent = '—';
  nameEl.textContent = ''; nextEl.textContent = '';
  progWrap.classList.remove('on'); progBar.style.width = '100%'; progBar.className = '';
  btnStart.style.display = 'inline-block'; btnReset.style.display = 'none';
}

// ── KEYS ──
document.addEventListener('keydown', e => {
  if (e.target.matches('input')) return;
  if (e.code === 'Space') { e.preventDefault(); if (!running) startSession(); }
  if (e.code === 'Escape' && sidebar.classList.contains('open')) toggleSidebar();
  if (e.code === 'KeyR') resetSession();
});
</script>
</body>
</html>
